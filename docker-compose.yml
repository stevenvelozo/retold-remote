# Retold Remote — Full Stack Docker Compose
#
# This compose file defaults to using a PRE-BUILT image (`retold-stack:latest`)
# so it works on Synology Container Manager without needing the source tree
# or the Dockerfile on the NAS itself.
#
# ============================================================
# DEPLOYMENT PATHS
# ============================================================
#
# A) On Synology (recommended): build the image elsewhere, transfer it
#    -----------------------------------------------------------------
#    1. On your dev machine:
#         cd retold-remote
#         ./docker-build-and-save.sh
#       This produces retold-stack-image.tar.gz (~1 GB).
#
#    2. Copy retold-stack-image.tar.gz AND this docker-compose.yml to
#       /volume1/docker/retold-stack/ on the NAS via File Station or scp.
#
#    3. SSH into the NAS and load the image:
#         cd /volume1/docker/retold-stack
#         sudo docker load -i retold-stack-image.tar.gz
#       (Or use Container Manager → Image → Add → From file.)
#
#    4. Edit the `media:` volume line below to point at your NAS folder.
#
#    5. In Container Manager → Project → Create:
#         - Project name: retold-stack
#         - Path:         /volume1/docker/retold-stack/
#         - Source:       Use existing docker-compose.yml
#       Click through and start.
#
#    6. Browse to http://your-nas-ip:7777/
#
# B) On any Docker host with the source tree present:
#    -------------------------------------------------
#    Uncomment the `build:` block below and comment out the `image:` line.
#    Then:    docker compose up -d --build
#
# C) Pulling from a registry (if you've published the image):
#    --------------------------------------------------------
#    Change `image: retold-stack:latest` to your registry path, e.g.:
#         image: ghcr.io/yourname/retold-stack:latest
#    Then: docker compose pull && docker compose up -d

services:
  retold-stack:
    # DEFAULT: use a locally-loaded image. Build it elsewhere with
    # ./docker-build-and-save.sh and load it with `docker load`.
    image: retold-stack:latest

    # ALTERNATIVE: build from source. Only works when the entire source
    # tree (Dockerfile, package.json, source/, web-application/, etc.)
    # is present alongside this compose file.
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: retold-stack
    hostname: retold-stack
    restart: unless-stopped

    # The image's CMD already launches the full stack via retold-stack.
    # Uncomment + edit this to override the content path, port, or flags.
    # command: ["node", "source/cli/RetoldRemote-Stack-Run.js", "/media", "-p", "7777", "--no-hash"]

    ports:
      # Retold Remote web UI — change the LEFT side to remap on the host.
      - "7777:7777"
      # Ultravisor web interface + API — optional, comment out if not needed.
      - "54321:54321"

    volumes:
      # MEDIA FOLDER (read-only) — point this at whatever you want to browse.
      #
      # On Synology, edit the left side directly to match your NAS layout, e.g.:
      #   - /volume1/media:/media:ro
      #   - /volume1/photo:/media:ro    (Photo Station)
      #   - /volume1/video:/media:ro    (Video Station)
      #
      # On other hosts, set MEDIA_PATH in the environment or .env file:
      #   MEDIA_PATH=/path/to/media docker compose up -d
      #
      # Default (./media) lets you test the image with an empty folder
      # next to this compose file.
      - ${MEDIA_PATH:-./media}:/media:ro

      # Retold Remote cache (thumbnails, frames, waveforms, conversions).
      # This grows as content is browsed; keep it on a volume for persistence.
      - retold-cache:/cache

      # Ultravisor datastore + staging (persistent state, work queue journal).
      - ultravisor-data:/data

      # Stack config files (generated ultravisor-stack.json, etc).
      - retold-config:/config

    environment:
      # XDG paths are already baked into the image; override here if desired.
      - XDG_CACHE_HOME=/cache
      - XDG_DATA_HOME=/data
      - XDG_CONFIG_HOME=/config
      # Node memory limit — bump up for large libraries or raw camera formats.
      - NODE_OPTIONS=--max-old-space-size=2048

      # Verbose diagnostic logging — Pict-style "log noisiness" on a 0-5 scale.
      # When non-zero, retold-remote AND its embedded Ultravisor coordinator
      # both emit detailed traces gated by `if (LogNoisiness >= N)` checks.
      # Useful for debugging the shared-fs reachability path, dispatcher
      # routing, and file-transfer short-circuit decisions.
      #
      #   0 = silent (production default)
      #   1 = high-level decisions (e.g. "auto-detected shared-fs peer X")
      #   2 = entry/exit of major code paths (resolve, transfer, auto-detect)
      #   3 = per-candidate iteration in the reachability scanner
      #   4 = per-mount comparison details
      #   5 = absolutely everything
      #
      # Uncomment and set to 2 or 3 when troubleshooting why a shared-fs path
      # isn't firing or why the file-transfer is or isn't short-circuiting.
      # - RETOLD_LOG_NOISINESS=2

      # Legacy debug-namespace logging (separate from LogNoisiness above):
      # - DEBUG=retold:*

    # Health check — waits until Retold Remote responds on its port.
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:7777/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

    # Synology-friendly resource limits (adjust to your NAS's specs).
    # Comment these out if you want unlimited resources.
    deploy:
      resources:
        limits:
          # Memory cap — most Synology NAS units have 1-8GB.
          # LibreOffice/Calibre conversions can be memory-hungry.
          memory: 2G
        reservations:
          memory: 512M

volumes:
  retold-cache:
    driver: local
  ultravisor-data:
    driver: local
  retold-config:
    driver: local
